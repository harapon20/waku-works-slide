<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小倉大学病院様 Webサイトリニューアル ご提案資料</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       RESET & BASE
       ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: #1E293B;
      background: #FFFFFF;
      line-height: 1.7;
    }
    ul, ol { list-style: none; }
    strong { font-weight: 700; }
    table { border-collapse: collapse; }

    /* ========================================
       SLIDES WRAPPER
       ======================================== */
    .slides-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
       SLIDE BASE
       ======================================== */
    .slide {
      width: 1920px;
      height: 1080px;
      background: #FFFFFF;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .slide__inner {
      width: 100%;
      height: 100%;
      padding: 80px 100px;
      display: flex;
      flex-direction: column;
    }
    .slide__deco {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      pointer-events: none;
    }

    /* ========================================
       COMMON ELEMENTS
       ======================================== */
    .section-label {
      font-size: 23px;
      font-weight: 700;
      color: #10B981;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
      padding-left: 16px;
      border-left: 4px solid #A7F3D0;
    }
    .slide__title {
      font-size: 40px;
      font-weight: 700;
      color: #10B981;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .slide__lead {
      font-size: 25px;
      color: #475569;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .slide__lead-accent {
      font-size: 27px;
      color: #059669;
      font-weight: 500;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .slide__note {
      font-size: 23px;
      color: #64748B;
      margin-top: auto;
      padding-top: 24px;
    }

    /* ========================================
       DECORATIVE CIRCLES
       ======================================== */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
    }
    .deco-circle--cover-1 {
      width: 720px; height: 720px;
      bottom: -220px; left: -180px;
      background: linear-gradient(140deg, #BBF7D0 0%, #86EFAC 100%);
      opacity: 0.7;
    }
    .deco-circle--cover-2 {
      width: 500px; height: 500px;
      top: 80px; right: -130px;
      background: linear-gradient(160deg, #6EE7B7 0%, #38BDF8 100%);
      opacity: 0.55;
    }
    .deco-circle--cover-3 {
      width: 340px; height: 340px;
      top: 160px; right: 180px;
      background: linear-gradient(180deg, #A7F3D0 0%, #7DD3FC 100%);
      opacity: 0.4;
    }
    .deco-circle--cover-4 {
      width: 220px; height: 220px;
      top: 100px; right: 100px;
      background: linear-gradient(135deg, #BBF7D0 0%, #7DD3FC 100%);
      opacity: 0.35;
    }
    .deco-circle--cover-5 {
      width: 420px; height: 420px;
      bottom: -60px; right: 40px;
      background: linear-gradient(200deg, #86EFAC 0%, #7DD3FC 100%);
      opacity: 0.5;
    }
    .deco-circle--chapter-1 {
      width: 360px; height: 360px;
      bottom: -100px; right: -80px;
      background: linear-gradient(135deg, #D1FAE5, #BAE6FD);
      opacity: 0.5;
    }
    .deco-circle--concept-1 {
      width: 500px; height: 500px;
      top: -180px; right: -160px;
      background: linear-gradient(135deg, #D1FAE5, #BAE6FD);
      opacity: 0.3;
    }
    .deco-circle--closing-1 {
      width: 600px; height: 600px;
      bottom: -200px; right: -150px;
      background: linear-gradient(135deg, #A7F3D0 0%, #7DD3FC 100%);
      opacity: 0.5;
    }
    .deco-circle--closing-2 {
      width: 300px; height: 300px;
      top: -80px; left: -80px;
      background: linear-gradient(135deg, #D1FAE5, #BAE6FD);
      opacity: 0.4;
    }
    .deco-circle--closing-3 {
      width: 180px; height: 180px;
      bottom: 120px; left: 100px;
      background: linear-gradient(160deg, #BAE6FD 0%, #D1FAE5 100%);
      opacity: 0.35;
    }

    /* ========================================
       SLIDE: Cover
       ======================================== */
    .slide--cover { display: flex; align-items: center; }
    .slide--cover .slide__content {
      padding: 0 100px;
      position: relative;
      z-index: 1;
      width: 60%;
    }
    .slide__client {
      font-size: 23px; font-weight: 500;
      color: #475569; margin-bottom: 32px;
      letter-spacing: 0.1em;
    }
    .slide__title-main {
      font-size: 60px; font-weight: 700;
      line-height: 1.35; color: #1E293B;
      margin-bottom: 48px;
    }
    .slide__title-sub { font-size: 48px; font-weight: 500; }
    .slide__meta { margin-top: 48px; }
    .slide__date {
      font-size: 23px; color: #64748B;
      margin-bottom: 8px; letter-spacing: 0.1em;
    }
    .slide__company {
      font-size: 27px; font-weight: 700;
      color: #10B981; letter-spacing: 0.05em;
    }

    /* ========================================
       SLIDE: TOC
       ======================================== */
    .slide--toc { display: flex; align-items: center; justify-content: center; }
    .slide--toc .slide__inner {
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      max-width: 800px; margin: 0 auto;
      padding: 80px 100px;
    }
    .toc__heading {
      font-size: 30px; font-weight: 700;
      color: #10B981; margin-bottom: 48px;
      letter-spacing: 0.08em;
    }
    .toc__list { width: 100%; }
    .toc__item {
      display: flex; align-items: baseline;
      padding: 20px 0;
      border-bottom: 1px solid #E2E8F0;
    }
    .toc__item--last { border-bottom: none; }
    .toc__number {
      font-size: 27px; font-weight: 700;
      color: #10B981; width: 60px;
      flex-shrink: 0; letter-spacing: 0.05em;
    }
    .toc__title { font-size: 27px; font-weight: 500; color: #1E293B; }

    /* ========================================
       SLIDE: Statement
       ======================================== */
    .slide--statement .slide__inner { justify-content: center; }
    .statement__layout {
      display: flex; flex-direction: column;
      gap: 48px; max-width: 1400px;
    }
    .statement__quote-text {
      font-size: 46px; font-weight: 700;
      line-height: 1.5; color: #0F172A;
      padding-left: 32px;
      border-left: 4px solid #10B981;
    }
    .statement__body { padding-left: 36px; }
    .statement__lead {
      font-size: 25px; color: #475569;
      line-height: 1.9; margin-bottom: 24px;
    }
    .statement__text {
      font-size: 25px; color: #1E293B;
      line-height: 1.9; margin-bottom: 16px;
    }

    /* ========================================
       SLIDE: Chapter
       ======================================== */
    .slide--chapter {
      display: flex; align-items: center;
      justify-content: center; background: #FFFFFF;
    }
    .slide--chapter .slide__inner {
      display: flex; align-items: center; justify-content: center;
    }
    .chapter__content {
      text-align: left; position: relative; z-index: 1;
    }
    .chapter__number {
      font-size: 80px; font-weight: 700;
      color: #A7F3D0; line-height: 1;
      margin-bottom: 16px; letter-spacing: 0.05em;
    }
    .chapter__title {
      font-size: 52px; font-weight: 700;
      color: #0F172A; line-height: 1.4;
      margin-bottom: 24px;
    }
    .chapter__accent {
      width: 60px; height: 4px;
      background: linear-gradient(135deg, #10B981, #38BDF8);
      border-radius: 2px; margin-bottom: 24px;
    }
    .chapter__subtitle {
      font-size: 25px; color: #475569; font-weight: 400;
    }

    /* ========================================
       SLIDE: Concept
       ======================================== */
    .slide--concept .slide__inner { justify-content: center; }
    .concept__layout {
      max-width: 1200px; display: flex;
      flex-direction: column; gap: 48px;
    }
    .concept__message {
      font-size: 44px; font-weight: 700;
      line-height: 1.6; color: #0F172A;
    }
    .concept__message-dash { color: #10B981; font-weight: 400; }
    .concept__sub { padding-left: 4px; }
    .concept__description {
      font-size: 27px; color: #475569; line-height: 1.9;
    }

    /* ========================================
       COMPONENT: Grid 2x2
       ======================================== */
    .grid-2x2 { display: flex; flex-wrap: wrap; gap: 32px; flex: 1; }
    .value-block {
      width: 820px;
      padding: 32px; background: #F8FAFC;
      border-radius: 8px; border-left: 3px solid #10B981;
    }
    .value-block__number {
      font-size: 23px; font-weight: 700;
      color: #10B981; margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .value-block__title {
      font-size: 27px; font-weight: 700;
      color: #0F172A; margin-bottom: 16px;
    }
    .value-block__text {
      font-size: 25px; color: #475569; line-height: 1.7;
    }

    /* ========================================
       COMPONENT: Target Layout
       ======================================== */
    .target__layout { display: flex; gap: 48px; flex: 1; }
    .target__primary {
      flex: 1.2; padding: 32px; background: #F8FAFC;
      border: 2px solid #10B981; border-radius: 8px;
    }
    .target__badge {
      display: inline-block; font-size: 23px; font-weight: 700;
      color: #FFFFFF; background: linear-gradient(135deg, #10B981, #38BDF8);
      padding: 4px 16px; border-radius: 4px;
      margin-bottom: 16px; letter-spacing: 0.08em;
    }
    .target__badge--sub { background: #64748B; }
    .target__name {
      font-size: 27px; font-weight: 700;
      color: #0F172A; margin-bottom: 16px;
    }
    .target__text { font-size: 25px; color: #475569; line-height: 1.7; }
    .target__secondary-group {
      flex: 1; display: flex; flex-direction: column; gap: 24px;
    }
    .target__secondary {
      padding: 24px; background: #F8FAFC;
      border-radius: 8px; flex: 1;
    }

    /* ========================================
       COMPONENT: Merit Grid
       ======================================== */
    .merit-grid { flex: 1; display: flex; flex-direction: column; gap: 24px; }
    .merit-grid__row { display: flex; gap: 24px; }
    .merit-card {
      flex: 1; padding: 24px 32px;
      background: #F8FAFC; border-radius: 8px;
      border-top: 3px solid #10B981;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .merit-card__label {
      font-size: 15px; font-weight: 700;
      color: #10B981; letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .merit-card__title {
      font-size: 23px; font-weight: 700;
      color: #0F172A; margin-bottom: 8px;
    }
    .merit-card__desc { font-size: 25px; color: #475569; line-height: 1.7; }
    .merit-card__stat { font-size: 25px; color: #475569; line-height: 1.7; }
    .stat-number { font-size: 36px; font-weight: 700; color: #10B981; line-height: 1; }
    .merit-grid__center { display: flex; justify-content: center; padding: 16px 0; }
    .merit-grid__center-box {
      padding: 24px 48px;
      background: linear-gradient(135deg, #D1FAE5, #BAE6FD);
      border-radius: 8px; text-align: center;
    }
    .merit-grid__center-text { font-size: 25px; color: #1E293B; line-height: 1.7; }

    /* ========================================
       COMPONENT: Detail Cards
       ======================================== */
    .detail-cards { display: flex; gap: 24px; flex-wrap: wrap; }
    .detail-card {
      flex: 1 1 calc(50% - 12px); min-width: calc(50% - 12px); display: flex; flex-direction: column;
      border: 1px solid #CBD5E1; border-radius: 8px; overflow: hidden;
    }
    .detail-card__header {
      padding: 24px 32px; background: #F8FAFC;
      border-bottom: 1px solid #E2E8F0;
    }
    .detail-card__title {
      font-size: 27px; font-weight: 700;
      color: #0F172A; margin-bottom: 8px;
    }
    .detail-card__hook { font-size: 25px; color: #059669; font-weight: 500; }
    .detail-card__body { padding: 24px 32px; flex: 1; }
    .detail-card__list { display: flex; flex-direction: column; gap: 16px; }
    .detail-card__list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 25px; color: #475569; line-height: 1.7;
    }

    /* ========================================
       LIST MARKERS (実DOM - Figma用)
       ======================================== */
    .list-marker {
      display: block; width: 8px; height: 2px;
      background: #10B981; margin-top: 13px; flex-shrink: 0;
    }
    .list-marker--issue {
      display: block; width: 8px; height: 2px;
      background: #EA580C; margin-top: 13px; flex-shrink: 0;
    }
    .list-dot {
      display: block; width: 8px; height: 8px;
      background: linear-gradient(135deg, #10B981, #38BDF8);
      border-radius: 50%; margin-top: 8px; flex-shrink: 0;
    }

    /* ========================================
       COMPONENT: Brand Columns
       ======================================== */
    .brand-columns { display: flex; gap: 48px; flex: 1; }
    .brand-block { flex: 1; display: flex; flex-direction: column; }
    .brand-block__icon-area { margin-bottom: 24px; }
    .brand-block__number { font-size: 48px; font-weight: 700; color: #A7F3D0; line-height: 1; }
    .brand-block__title {
      font-size: 27px; font-weight: 700; color: #0F172A;
      margin-bottom: 24px; padding-bottom: 24px;
      border-bottom: 2px solid #E2E8F0;
    }
    .brand-block__text { font-size: 25px; color: #475569; line-height: 1.9; }

    /* ========================================
       COMPONENT: Three / Two Column
       ======================================== */
    .three-col { display: flex; gap: 32px; flex: 1; }
    .two-col { display: flex; gap: 48px; flex: 1; }
    .two-col__left { flex: 1; }
    .two-col__right { flex: 1; }

    .feature-block {
      flex: 1; padding: 32px; background: #F8FAFC;
      border-radius: 8px; border-top: 3px solid #10B981;
    }
    .feature-block__title {
      font-size: 27px; font-weight: 700;
      color: #0F172A; margin-bottom: 24px;
    }
    .feature-block__text { font-size: 25px; color: #475569; line-height: 1.9; }

    /* ========================================
       COMPONENT: FV Mockup / Point List
       ======================================== */
    .fv-mockup { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .fv-mockup__placeholder {
      width: 100%; height: 100%; min-height: 400px;
      background: #F8FAFC; border: 2px dashed #CBD5E1;
      border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .fv-mockup__text { font-size: 27px; color: #64748B; font-weight: 500; }
    .fv-mockup__note { font-size: 23px; color: #64748B; }

    .point-list { display: flex; flex-direction: column; gap: 32px; }
    .point-item { padding-left: 24px; border-left: 3px solid #10B981; }
    .point-item__title { font-size: 23px; font-weight: 700; color: #0F172A; margin-bottom: 8px; }
    .point-item__text { font-size: 25px; color: #475569; line-height: 1.7; }

    /* ========================================
       COMPONENT: Sitemap
       ======================================== */
    .sitemap-group { flex: 1; display: flex; flex-direction: column; gap: 24px; }
    .sitemap-group__label {
      font-size: 20px; font-weight: 700; color: #059669;
      border-bottom: 2px solid #10B981; padding-bottom: 8px; margin-bottom: 0;
    }
    .sitemap { display: flex; flex-direction: column; gap: 20px; }
    .sitemap__top { display: flex; justify-content: center; }
    .sitemap__node {
      padding: 12px 24px; border-radius: 6px;
      font-size: 20px; font-weight: 700; text-align: center;
    }
    .sitemap__node--top {
      background: linear-gradient(135deg, #10B981, #38BDF8);
      color: #FFFFFF; font-size: 20px; padding: 16px 36px;
    }
    .sitemap__node--cat {
      background: #F8FAFC; color: #059669;
      border: 1px solid #CBD5E1;
    }
    .sitemap__branches { display: flex; gap: 16px; }
    .sitemap__branch { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .sitemap__leaves { display: flex; flex-direction: column; gap: 4px; }
    .sitemap__leaf {
      padding: 6px 12px; background: #FFFFFF;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: 18px; color: #475569; text-align: center;
    }
    .sitemap-sub-group { display: flex; gap: 32px; margin-top: 8px; }
    .sitemap-sub {
      flex: 1; display: flex; flex-direction: column; gap: 12px;
      padding: 20px 24px; background: #F8FAFC; border-radius: 8px;
      border: 1px solid #E2E8F0;
    }
    .sitemap-sub__title {
      font-size: 20px; font-weight: 700; color: #0F172A;
    }
    .sitemap-sub__note { font-size: 16px; color: #64748B; line-height: 1.6; }
    .sitemap-sub__leaves { display: flex; flex-direction: column; gap: 4px; }
    .sitemap-sub__leaf {
      padding: 6px 12px; background: #FFFFFF;
      border: 1px solid #E2E8F0; border-radius: 4px;
      font-size: 18px; color: #475569; text-align: center;
    }

    /* ========================================
       COMPONENT: Top Page Layout
       ======================================== */
    .toppage-layout { display: flex; flex-direction: column; gap: 32px; flex: 1; }
    .toppage-nav { padding: 24px 32px; background: #F8FAFC; border-radius: 8px; }
    .toppage-nav__heading { font-size: 23px; font-weight: 700; color: #0F172A; margin-bottom: 24px; }
    .toppage-nav__items { display: flex; gap: 24px; }
    .toppage-nav__item {
      flex: 1; padding: 16px 24px; background: #FFFFFF;
      border-radius: 6px; border: 1px solid #E2E8F0;
    }
    .toppage-nav__label { display: block; font-size: 23px; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
    .toppage-nav__note { display: block; font-size: 23px; color: #64748B; }
    .toppage-features { display: flex; gap: 32px; }
    .toppage-feature { flex: 1; padding: 24px 32px; border-left: 3px solid #10B981; }
    .toppage-feature__title { font-size: 23px; font-weight: 700; color: #0F172A; margin-bottom: 16px; }
    .toppage-feature__text { font-size: 25px; color: #475569; line-height: 1.7; }

    /* ========================================
       COMPONENT: Solution Layout
       ======================================== */
    .solution-layout {
      display: flex; flex: 1;
      border: 1px solid #CBD5E1; border-radius: 8px; overflow: hidden;
    }
    .solution-col { padding: 32px; display: flex; flex-direction: column; }
    .solution-col--issue { flex: 0.8; background: #FFF7ED; border-right: 1px solid #E2E8F0; }
    .solution-col--plan { flex: 1.6; background: #FFFFFF; border-right: 1px solid #E2E8F0; }
    .solution-col--effect { flex: 0.8; background: #ECFDF5; }
    .solution-col__heading {
      font-size: 23px; font-weight: 700;
      letter-spacing: 0.15em; margin-bottom: 24px;
      padding-bottom: 16px;
    }
    .solution-col--issue .solution-col__heading { color: #EA580C; border-bottom: 2px solid #EA580C; }
    .solution-col--plan .solution-col__heading { color: #10B981; border-bottom: 2px solid #10B981; }
    .solution-col--effect .solution-col__heading { color: #059669; border-bottom: 2px solid #059669; }
    .solution-col__text { font-size: 25px; color: #475569; line-height: 1.9; }
    .solution-col__list { display: flex; flex-direction: column; gap: 10px; }
    .solution-col__list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 25px; color: #475569; line-height: 1.7;
    }
    .solution-col__plus {
      margin-top: auto; padding-top: 24px;
      border-top: 1px solid #E2E8F0;
    }
    .solution-col__plus-heading {
      font-size: 23px; font-weight: 700;
      color: #10B981; margin-bottom: 16px;
    }
    .solution-col__effect-list { display: flex; flex-direction: column; gap: 16px; }
    .solution-col__effect-list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 25px; color: #059669; font-weight: 500;
    }
    .solution-col__cost { margin-top: auto; padding-top: 24px; border-top: 1px solid #E2E8F0; }
    .solution-col__cost-text { font-size: 23px; font-weight: 700; color: #10B981; }

    /* ========================================
       COMPONENT: Anniversary
       ======================================== */
    .anniversary-layout { display: flex; gap: 32px; flex: 1; }
    .anniversary-block { flex: 1; padding: 32px; border-left: 3px solid #10B981; }
    .anniversary-block__title { font-size: 27px; font-weight: 700; color: #0F172A; margin-bottom: 24px; }
    .anniversary-block__text { font-size: 25px; color: #475569; line-height: 1.9; }

    /* ========================================
       COMPONENT: Cost Table
       ======================================== */
    .cost-table-wrap { flex: 1; display: flex; flex-direction: column; }
    .cost-table { width: 100%; margin-bottom: 24px; }
    .cost-table__th {
      padding: 24px 32px; background: #F8FAFC;
      font-size: 23px; font-weight: 700; color: #0F172A;
      text-align: left; border-bottom: 2px solid #CBD5E1;
    }
    .cost-table__th--price { text-align: right; width: 200px; }
    .cost-table__td {
      padding: 24px 32px; font-size: 25px; color: #475569;
      border-bottom: 1px solid #E2E8F0; vertical-align: top;
    }
    .cost-table__td--price { text-align: right; font-weight: 500; color: #1E293B; white-space: nowrap; }
